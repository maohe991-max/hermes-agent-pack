name: CI
on:
  pull_request:
    paths:
      - 'skills/**'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check sub-agent frontmatter (v0.8.2)
        run: |
          pip install pyyaml -q
          python3 .github/scripts/validate_sub_agents.py
